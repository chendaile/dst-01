version: '3'
services:
  dst_caves:
    container_name: dst_caves_01
    image: mathielo/dst-dedicated-server:0.3.1
    ports:
      - "11998:11998/udp"
      # - "12346:12347/udp"
    networks:
      - dst_cluster_01
    links:
      - dst_master
    volumes:
      - ./DSTClusterConfig:/home/dst/.klei/DoNotStarveTogether/DSTWhalesCluster
      # The game is downloaded fresh into this persisted mount on every boot (see
      # start-container-server.sh), so the server always runs the current version and is
      # never frozen at the version baked into the image.
      - ./volumes/server_dst:/home/dst/server_dst
      - ./volumes/mods:/home/dst/server_dst/mods
      # Use our version-controlled entrypoint instead of the one baked into the image.
      - ./start-container-server.sh:/home/dst/start-container-server.sh:ro
    environment:
      - SHARD_NAME=Caves
      # Proxy env intentionally DISABLED. With Clash TUN (transparent proxy) active, these
      # make steamcmd hang at "Loading Steam API...OK" (it tries to tunnel the Steam
      # connection through the HTTP proxy). TUN already routes everything transparently.
      # - HTTP_PROXY=http://172.17.0.1:7890
      # - HTTPS_PROXY=http://172.17.0.1:7890
      # - NO_PROXY=localhost,127.0.0.1
    depends_on: 
    - dst_master

  dst_master:
    container_name: dst_master_01
    image: mathielo/dst-dedicated-server:0.3.1
    networks:
      - dst_cluster_01
    ports:
      - "11999:11999/udp"
      # - "12346:12346/udp"
    volumes:
      - ./DSTClusterConfig:/home/dst/.klei/DoNotStarveTogether/DSTWhalesCluster
      # The game is downloaded fresh into this persisted mount on every boot (see
      # start-container-server.sh), so the server always runs the current version and is
      # never frozen at the version baked into the image.
      - ./volumes/server_dst:/home/dst/server_dst
      - ./volumes/mods:/home/dst/server_dst/mods
      # Use our version-controlled entrypoint instead of the one baked into the image.
      - ./start-container-server.sh:/home/dst/start-container-server.sh:ro
    environment:
      - SHARD_NAME=Master
      # Proxy env intentionally DISABLED. With Clash TUN (transparent proxy) active, these
      # make steamcmd hang at "Loading Steam API...OK" (it tries to tunnel the Steam
      # connection through the HTTP proxy). TUN already routes everything transparently.
      # - HTTP_PROXY=http://172.17.0.1:7890
      # - HTTPS_PROXY=http://172.17.0.1:7890
      # - NO_PROXY=localhost,127.0.0.1

    # These allow to stdin when attaching to the container via `docker attach`
    # Any server commands should be sent to the master shard as it manages its slaves (Caves)
    stdin_open: true
    tty: true

networks:
  dst_cluster_01:

